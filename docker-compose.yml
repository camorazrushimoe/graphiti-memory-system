services:
  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    ports:
      - "8100:8100"
    environment:
      - LM_STUDIO_URL=${LM_STUDIO_URL}
      - LLM_MODEL=${LLM_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_DSN=postgresql://memory:${POSTGRES_PASSWORD}@postgres:5432/memory_system
      - RAW_ARCHIVE_PATH=/app/data/raw
    volumes:
      - ./data/raw:/app/data/raw
    depends_on:
      - neo4j
      - qdrant
      - postgres

  compiler:
    build:
      context: .
      dockerfile: services/compiler/Dockerfile
    environment:
      - LM_STUDIO_URL=${LM_STUDIO_URL}
      - LLM_MODEL=${LLM_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_DSN=postgresql://memory:${POSTGRES_PASSWORD}@postgres:5432/memory_system
      - RAW_ARCHIVE_PATH=/app/data/raw
    volumes:
      - ./data/raw:/app/data/raw
    depends_on:
      - postgres
      - neo4j
      - qdrant

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: memory_system
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
